# Model Configuration

# Backbone options
backbone: "resnet50"  # Options: resnet50, resnet101
pretrained: true
feature_dim: 256

# Device settings
device: "cuda"  # Options: cuda, cpu
num_workers: 4
batch_size: 32

# Training parameters
num_classes: 150  # Number of identities
learning_rate: 0.001
weight_decay: 0.0005
num_epochs: 100

# Model components
use_pose_estimation: true
use_attention: true
use_view_transform: true
use_feature_pyramid: true
